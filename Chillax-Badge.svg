<svg width="400" height="110" viewBox="0 0 400 110" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <!-- Soft Background Gradient (Deep Chill) -->
    <linearGradient id="softDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29;stop-opacity:0.95" />
      <stop offset="50%" style="stop-color:#302b63;stop-opacity:0.85" />
      <stop offset="100%" style="stop-color:#24243e;stop-opacity:0.95" />
    </linearGradient>

    <!-- The "Chill" Border Gradient -->
    <linearGradient id="chillBorder" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF4B4B" />  <!-- Chillax Red -->
      <stop offset="100%" style="stop-color:#5865F2" /> <!-- Discord Blue -->
    </linearGradient>

    <!-- Avatar Crop Circle -->
    <clipPath id="avatarCrop">
      <circle cx="55" cy="55" r="35" />
    </clipPath>
    
    <!-- Soft Glow Filter for Text -->
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="0.8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Card Body -->
  <rect x="2" y="2" width="396" height="106" rx="55" ry="55" 
        fill="url(#softDark)" 
        stroke="url(#chillBorder)" 
        stroke-width="2" />
        
  <!-- Background Liquid Effect (Subtle Moving Blobs) -->
  <circle cx="50" cy="50" r="40" fill="#FF4B4B" opacity="0.08" filter="url(#softGlow)">
      <animate attributeName="cx" values="50;350;50" dur="15s" repeatCount="indefinite" />
  </circle>
  <circle cx="350" cy="60" r="30" fill="#5865F2" opacity="0.08" filter="url(#softGlow)">
      <animate attributeName="cx" values="350;50;350" dur="12s" repeatCount="indefinite" />
  </circle>

  <!-- Left Side: Avatar Image -->
  <image x="20" y="20" width="70" height="70" clip-path="url(#avatarCrop)"
         preserveAspectRatio="xMidYMid slice"
         href="https://avatars.githubusercontent.com/u/168612672?s=280&v=4">
         <!-- Gentle pulse on image -->
         <animateTransform attributeName="transform" type="scale" values="1;1.05;1" dur="4s" repeatCount="indefinite" additive="sum" transform="translate(-2.75, -2.75)"/>
  </image>

  <!-- Right Side: Text -->
  <g transform="translate(110, 42)">
    <text x="0" y="0" font-family="'Trebuchet MS', 'Segoe UI', sans-serif" font-weight="bold" font-size="28" fill="#FFFFFF" letter-spacing="1">
      CHILLAX
    </text>
    <text x="0" y="24" font-family="'Trebuchet MS', 'Segoe UI', sans-serif" font-weight="400" font-size="14" fill="#aab0c0" letter-spacing="3">
      SUPPORT SERVER
    </text>
  </g>
  
  <!-- Arrow Indicator -->
  <path d="M 330 55 L 340 55 M 336 51 L 340 55 L 336 59" stroke="white" stroke-width="2" stroke-linecap="round" fill="none">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" type="translate" values="0,0; 5,0; 0,0" dur="2s" repeatCount="indefinite"/>
  </path>
</svg>
